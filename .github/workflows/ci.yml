name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Token codegen is current
        run: dart run tool/gen_tokens.dart --check

      - name: Analyze
        run: flutter analyze

      - name: Test (excluding goldens)
        run: flutter test --exclude-tags golden

      - name: Grep guards (colors, em dashes, copy, retired hexes)
        run: bash tool/ci_greps.sh
