name: closero_app
description: "Closero: AI sales training. Practice the call before it costs you the deal."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  cloud_firestore: ^6.6.0
  cloud_functions: ^6.3.3
  cupertino_icons: ^1.0.9
  firebase_auth: ^6.5.4
  firebase_core: ^4.11.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  flutter_web_plugins:
    sdk: flutter
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  json_annotation: ^4.12.0
  just_audio: ^0.10.6
  record: ^7.1.1
  rive: ^0.14.9
  riverpod_annotation: ^4.0.3
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.1
  web_socket_channel: ^3.0.3

dev_dependencies:
  alchemist: ^0.14.0
  build_runner: ^2.15.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0
  riverpod_generator: ^4.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/rive/avatar.riv

  fonts:
    - family: Figtree
      fonts:
        - asset: assets/fonts/Figtree-Regular.ttf
          weight: 400
        - asset: assets/fonts/Figtree-Medium.ttf
          weight: 500
        - asset: assets/fonts/Figtree-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Figtree-Bold.ttf
          weight: 700
    - family: Bricolage Grotesque
      fonts:
        - asset: assets/fonts/BricolageGrotesque-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/BricolageGrotesque-Bold.ttf
          weight: 700
        - asset: assets/fonts/BricolageGrotesque-ExtraBold.ttf
          weight: 800
